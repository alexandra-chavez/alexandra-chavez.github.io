title: Alexandra Chávez
email: 
description: >-
  Evolutionary biology, experimental ecology, chemical ecology, epigenetics and population genetics.

github_username: alexandra-chavez
minimal_mistakes_skin: default
search: true

# Opcional (lo pondremos cuando tengas dominio propio)
url: "https://alexandra-chavez.github.io"
baseurl: ""


# Build settings
markdown: kramdown
remote_theme: mmistakes/minimal-mistakes
# Outputting
permalink: /:categories/:title/
paginate: 5 # amount of posts to show
paginate_path: /page:num/
timezone: # https://en.wikipedia.org/wiki/List_of_tz_database_time_zones

include:
  - _pages

# Exclude from processing.
# The following items will not be processed, by default. Create a custom list
# to override the default setting.
# exclude:
#   - Gemfile
#   - Gemfile.lock
#   - node_modules
#   - vendor/bundle/
#   - vendor/cache/
#   - vendor/gems/
#   - vendor/ruby/

# Plugins (previously gems:)
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

author:
  name: "Alexandra Chávez"
  avatar: "/assets/images/profile.jpg"
  bio: "Evolutionary biology • experimental ecology • chemical ecology • epigenetics • population genetics"

  links:
    - label: "ORCID"
      icon: "ai ai-orcid"
      url: "https://orcid.org/0000-0003-1895-8172"

    - label: "Instagram"
      icon: "fab fa-fw fa-instagram"
      url: "https://instagram.com/alemireya"
      
    - label: "Google Scholar"
      icon: "ai ai-google-scholar"
      url: "https://scholar.google.com/citations?user=ol5FBssAAAAJ&hl=es&oi=ao"

    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/alexandra-chavez"
      
    - label: "ResearchGate"
      icon: "fab fa-fw fa-researchgate"
      url: "https://www.researchgate.net/profile/Alexandra-Chavez-20"
footer:
  links:
    - label: "ORCID"
      icon: "ai ai-orcid"
      url: "https://orcid.org/0000-0003-1895-8172"

    - label: "Instagram"
      icon: "fab fa-fw fa-instagram"
      url: "https://instagram.com/alemireya"
      
    - label: "Google Scholar"
      icon: "ai ai-google-scholar"
      url: "https://scholar.google.com/citations?user=ol5FBssAAAAJ&hl=es&oi=ao"

    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/alexandra-chavez"
      
    - label: "ResearchGate"
      icon: "fab fa-fw fa-researchgate"
      url: "https://www.researchgate.net/profile/Alexandra-Chavez-20"

defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
  # _pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/
